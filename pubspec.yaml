name: cairo_clinics_finder
description: "A new Flutter project."
publish_to: "none" # Remove this line if you wish to publish to pub.dev

version: 1.0.0+1

environment:
  sdk: ^3.10.7

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8
  flutter_screenutil: ^5.9.3
  latlong2: ^0.9.1
  equatable: ^2.0.8
  flutter_bloc: ^9.1.1
  geolocator: ^14.0.2
  flutter_map: ^8.2.2
  path_provider: ^2.1.4
  dartz: ^0.10.1
  get_it: ^9.2.1
  firebase_core: ^4.7.0
  firebase_auth: ^6.4.0
  cloud_firestore: ^6.3.0
  font_awesome_flutter: ^11.0.0
  url_launcher: ^6.3.2
  lottie: ^3.3.2
  go_router: ^17.2.0
  flutter_rating_bar: ^4.0.1
  dio: ^5.9.2
  image_picker: ^1.2.1
  cached_network_image: ^3.4.1
  flutter_launcher_icons: ^0.14.4
  easy_localization: ^3.0.8

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter_launcher_icons:
  android: "launcher_icon"
  ios: true
  image_path: "assets/launcher_icon.png"
  min_sdk_android: 21

flutter:
  uses-material-design: true

  assets:
    - assets/
    - assets/translations/
